name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test Go packages
        run: go test ./...

      - name: Build bridge extension VSIX
        working-directory: bridge-extension
        run: |
          npm ci
          npx @vscode/vsce package

      - name: Build cross-platform binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/bin/windows-amd64 dist/bin/linux-amd64
          GOOS=windows GOARCH=amd64 go build -o dist/bin/windows-amd64/bridgectl.exe ./cmd/bridgectl
          GOOS=windows GOARCH=amd64 go build -o dist/bin/windows-amd64/jupyterbridge-mcp.exe ./cmd/jupyterbridge-mcp
          GOOS=windows GOARCH=amd64 go build -o dist/bin/windows-amd64/releasecheck.exe ./cmd/releasecheck
          GOOS=linux GOARCH=amd64 go build -o dist/bin/linux-amd64/bridgectl ./cmd/bridgectl
          GOOS=linux GOARCH=amd64 go build -o dist/bin/linux-amd64/jupyterbridge-mcp ./cmd/jupyterbridge-mcp
          GOOS=linux GOARCH=amd64 go build -o dist/bin/linux-amd64/releasecheck ./cmd/releasecheck

      - name: Assemble skill bundle
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_ROOT="dist/skill-bundle/jupyter-bridge-notebook"
          mkdir -p "$BUNDLE_ROOT"
          rsync -a --exclude 'scripts/bridgectl*' --exclude 'scripts/jupyterbridge-mcp*' --exclude 'assets/vscode-data-bridge/*.vsix' codex-skill/jupyter-bridge-notebook/ "$BUNDLE_ROOT/"
          mkdir -p "$BUNDLE_ROOT/bin/windows-amd64" "$BUNDLE_ROOT/bin/linux-amd64"
          cp dist/bin/windows-amd64/bridgectl.exe "$BUNDLE_ROOT/bin/windows-amd64/"
          cp dist/bin/windows-amd64/jupyterbridge-mcp.exe "$BUNDLE_ROOT/bin/windows-amd64/"
          cp dist/bin/linux-amd64/bridgectl "$BUNDLE_ROOT/bin/linux-amd64/"
          cp dist/bin/linux-amd64/jupyterbridge-mcp "$BUNDLE_ROOT/bin/linux-amd64/"
          mkdir -p "$BUNDLE_ROOT/assets/vscode-data-bridge"
          cp bridge-extension/vscode-data-bridge-0.0.1.vsix "$BUNDLE_ROOT/assets/vscode-data-bridge/"
          cp bridge-extension/extension.js "$BUNDLE_ROOT/assets/vscode-data-bridge/"
          cp bridge-extension/package.json "$BUNDLE_ROOT/assets/vscode-data-bridge/"
          cp bridge-extension/package.nls.json "$BUNDLE_ROOT/assets/vscode-data-bridge/"
          cp bridge-extension/package.nls.zh-cn.json "$BUNDLE_ROOT/assets/vscode-data-bridge/"
          cp bridge-extension/README.md "$BUNDLE_ROOT/assets/vscode-data-bridge/"
          mkdir -p "$BUNDLE_ROOT/assets/vscode-data-bridge/media"
          cp bridge-extension/media/data-bridge.svg "$BUNDLE_ROOT/assets/vscode-data-bridge/media/"

      - name: Archive release artifacts
        shell: bash
        run: |
          set -euo pipefail
          cp bridge-extension/vscode-data-bridge-0.0.1.vsix dist/
          (cd dist/bin/windows-amd64 && zip -9 -r ../../bridgectl-windows-amd64.zip bridgectl.exe)
          (cd dist/bin/windows-amd64 && zip -9 -r ../../jupyterbridge-mcp-windows-amd64.zip jupyterbridge-mcp.exe)
          (cd dist/bin/linux-amd64 && tar -czf ../../bridgectl-linux-amd64.tar.gz bridgectl)
          (cd dist/bin/linux-amd64 && tar -czf ../../jupyterbridge-mcp-linux-amd64.tar.gz jupyterbridge-mcp)
          (cd dist/skill-bundle && zip -9 -r ../jupyter-bridge-notebook-skill-bundle.zip jupyter-bridge-notebook)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jupyter-bridge-release-assets
          path: |
            dist/vscode-data-bridge-0.0.1.vsix
            dist/bridgectl-windows-amd64.zip
            dist/jupyterbridge-mcp-windows-amd64.zip
            dist/bridgectl-linux-amd64.tar.gz
            dist/jupyterbridge-mcp-linux-amd64.tar.gz
            dist/jupyter-bridge-notebook-skill-bundle.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vscode-data-bridge-0.0.1.vsix
            dist/bridgectl-windows-amd64.zip
            dist/jupyterbridge-mcp-windows-amd64.zip
            dist/bridgectl-linux-amd64.tar.gz
            dist/jupyterbridge-mcp-linux-amd64.tar.gz
            dist/jupyter-bridge-notebook-skill-bundle.zip
